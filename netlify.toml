# Netlify configuration for Tidal Swimwear
[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/shop"
  to = "/collection.html"
  status = 301

[[redirects]]
  from = "/collection"
  to = "/collection.html"
  status = 200
